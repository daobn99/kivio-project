services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: ../kivio-backend/.env
        required: false
    environment:
      # Container-internal service URLs (override .env)
      DB_URL: jdbc:postgresql://db:5432/kivio
      DB_USERNAME: kivio
      DB_PASSWORD: password
      REDIS_URL: redis://redis:6379
      MAIL_HOST: mailpit
      MAIL_PORT: "1025"
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      SPRING_PROFILES_ACTIVE: dev
    volumes:
      - ..:/workspace:cached
      # Named volume for Gradle cache — survives container rebuilds
      - gradle-cache:/home/vscode/.gradle
      # Anonymous volume prevents macOS-mounted node_modules (frontend)
      - /workspace/kivio-frontend/node_modules
    command: sleep infinity
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      mailpit:
        condition: service_started
    networks:
      - kivio-network

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kivio
      POSTGRES_USER: kivio
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kivio -d kivio"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - kivio-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - kivio-network

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP (Spring Boot → Mailpit)
      - "8025:8025"   # Web UI for viewing sent emails
    networks:
      - kivio-network

volumes:
  postgres-data:
  redis-data:
  gradle-cache:

networks:
  kivio-network:
    driver: bridge
