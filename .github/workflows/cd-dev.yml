name: CD — Develop

# CI ワークフローが develop ブランチで成功した後にのみ実行
# → PR マージ時: CI は PR で通過済み → push to develop で CI 再実行 → 成功後 CD
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [develop]

permissions:
  contents: read
  packages: write       # ghcr.io へのイメージプッシュ
  security-events: write # Trivy SARIF を Security タブへアップロード

jobs:
  # ── Docker Build & Push ────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push — ${{ matrix.service }}
    # CI が成功した場合のみ実行（テスト失敗時はイメージをプッシュしない）
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./kivio-backend
          - service: frontend
            context: ./kivio-frontend

    steps:
      - name: Checkout at CI commit SHA
        uses: actions/checkout@v4
        with:
          # CI を通過したコミットを正確にチェックアウトする
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Extract short SHA
        id: vars
        run: |
          SHORT_SHA="${SHA::7}"
          # ghcr.io はイメージ名を小文字強制するため、リポジトリ名を必ず小文字に変換する
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${REPO}/${{ matrix.service }}" >> "$GITHUB_OUTPUT"
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}

      # ── Docker Setup ──────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Image Metadata ─────────────────────────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image }}
          tags: |
            # 不変タグ: デプロイ時はこの SHA タグを使用する
            type=raw,value=sha-${{ steps.vars.outputs.short_sha }}
            # ブランチタグ: 最新の develop ビルドを指す可変タグ
            type=raw,value=develop
          labels: |
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}

      # ── Build & Push ──────────────────────────────────────────────────────
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          # サービスごとにキャッシュスコープを分けてキャッシュ競合を防ぐ
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      # ── Security Scan ─────────────────────────────────────────────────────
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          # digest 参照により再プルなしでローカルイメージをスキャンする
          image-ref: ${{ steps.vars.outputs.image }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: HIGH,CRITICAL
          # 脆弱性が見つかってもジョブを失敗させない（まず可視化を優先）
          # 運用が安定したら exit-code: '1' に変更してブロッキングにする
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload Trivy results to Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

      # ── Build Summary ──────────────────────────────────────────────────────
      - name: Write job summary
        run: |
          echo "## Docker Image: \`${{ matrix.service }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ steps.vars.outputs.image }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SHA tag | \`sha-${{ steps.vars.outputs.short_sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Digest | \`${{ steps.build.outputs.digest }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.event.workflow_run.head_sha }}\` |" >> "$GITHUB_STEP_SUMMARY"

  # ── Deploy ─────────────────────────────────────────────────────────────────
  # デプロイ手順は環境依存のためコメントアウトで提供する。
  # 使用するインフラに合わせて以下のいずれかを参考に実装してください。
