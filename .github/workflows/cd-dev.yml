  #       id: vars
  #       run: echo "short_sha=${SHA::7}" >> "$GITHUB_OUTPUT"
  #       env:
  #         SHA: ${{ github.event.workflow_run.head_sha }}
  #
  #     # ── パターン A: SSH + Docker Compose ──────────────────────────────────
  #     # Secrets: DEV_HOST, DEV_USER, DEV_SSH_KEY
