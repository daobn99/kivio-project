  #     #     host: ${{ secrets.DEV_HOST }}
  #     #     username: ${{ secrets.DEV_USER }}
  #     #     key: ${{ secrets.DEV_SSH_KEY }}
  #     #     script: |
  #     #       cd /opt/kivio
  #     #       echo "${{ secrets.GITHUB_TOKEN }}" | \
  #     #         docker login ghcr.io -u ${{ github.actor }} --password-stdin
