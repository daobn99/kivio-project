spring:
  application:
    name: kivio-backend
  mvc:
    problemdetails:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://db:5432/kivio}
    username: ${DB_USERNAME:kivio}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    clean-disabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      client:
        registration:
          google:
            # dummy は未設定でも起動できるようにするための placeholder. Google OAuth を使う場合は .env に GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET を設定する
            client-id: ${GOOGLE_CLIENT_ID:dummy}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy}
            scope: openid,email,profile

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900}
    refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800}
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
  rate-limit:
    auth:
      capacity: ${RATE_LIMIT_AUTH_CAPACITY:10}
      refill-duration-seconds: ${RATE_LIMIT_AUTH_DURATION:60}
    api:
      capacity: ${RATE_LIMIT_API_CAPACITY:100}
      refill-duration-seconds: ${RATE_LIMIT_API_DURATION:60}
    public:
      capacity: ${RATE_LIMIT_PUBLIC_CAPACITY:30}
      refill-duration-seconds: ${RATE_LIMIT_PUBLIC_DURATION:60}
  problem-base-url: ${PROBLEM_BASE_URL:https://kivio.example.com}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    disable-swagger-default-url: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    "[io.kivio]": INFO

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
  flyway:
    clean-disabled: false
    locations: classpath:db/migration,classpath:db/migration/dev

logging:
  level:
    "[io.kivio]": DEBUG

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:tc:postgresql:17://localhost/kivio_test?TC_REUSABLE=true
    username: test
    password: test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    show-sql: false
  flyway:
    clean-disabled: false
    locations: classpath:db/migration
---
spring:
  config:
    activate:
      on-profile: prod
  flyway:
    clean-disabled: true

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
